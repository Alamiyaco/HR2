<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الهيكل التنظيمي الإداري</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   TOKENS
───────────────────────────────────────── */
:root{
  --ink:      #0B1E33;
  --ink-2:    #1E3A52;
  --ink-3:    #2E5470;
  --sky:      #0EA5E9;
  --sky-d:    #0284C7;
  --sky-l:    #BAE6FD;
  --sky-xl:   #E0F2FE;
  --teal:     #0D9488;
  --amber:    #F59E0B;
  --amber-l:  #FEF3C7;
  --emerald:  #059669;
  --em-l:     #D1FAE5;
  --rose:     #E11D48;
  --rose-l:   #FFE4E6;
  --purple:   #7C3AED;
  --pur-l:    #EDE9FE;
  --slate:    #64748B;
  --slate-l:  #CBD5E1;
  --bg:       #F1F5F9;
  --card:     #FFFFFF;
  --border:   #E2E8F0;
  --border-d: #CBD5E1;
  --sh-sm:    0 1px 3px rgba(11,30,51,.06),0 1px 2px rgba(11,30,51,.04);
  --sh-md:    0 4px 16px rgba(11,30,51,.08),0 2px 6px rgba(11,30,51,.05);
  --sh-lg:    0 10px 40px rgba(11,30,51,.12),0 4px 12px rgba(11,30,51,.06);
  --sh-xl:    0 20px 60px rgba(11,30,51,.16),0 8px 20px rgba(11,30,51,.08);
  --r:        12px;
  --r-lg:     18px;
  --r-xl:     24px;
  --r-full:   9999px;
  --f:        'Tajawal',sans-serif;
  --ease:     cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}

/* ─────────────────────────────────────────
   HEADER
───────────────────────────────────────── */
.hd{
  background:var(--ink);
  padding:0;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,.25);
}
.hd-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:68px;gap:20px;
}
.hd-brand{display:flex;align-items:center;gap:14px}
.hd-logo{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,var(--sky-d),var(--sky));
  display:grid;place-items:center;font-size:20px;
  box-shadow:0 4px 12px rgba(14,165,233,.4);
  flex-shrink:0;
}
.hd-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:.3px}
.hd-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;font-weight:400}
.hd-actions{display:flex;align-items:center;gap:12px}
.hd-search-wrap{position:relative}
.hd-search{
  font-family:var(--f);
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.14);
  border-radius:var(--r-full);
  padding:8px 38px 8px 18px;
  color:#fff;font-size:13px;
  width:240px;outline:none;
  transition:all .2s var(--ease);
}
.hd-search::placeholder{color:rgba(255,255,255,.35)}
.hd-search:focus{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.28);width:290px}
.hd-search-icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;opacity:.4;pointer-events:none;
}
.hd-sr{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--sh-xl);border:1px solid var(--border);
  display:none;max-height:320px;overflow-y:auto;z-index:999;
}
.hd-sr.vis{display:block}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--sky-xl)}
.sr-av{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;font-size:13px;font-weight:800;color:#fff;
}
.sr-name{font-size:13px;font-weight:700;color:var(--ink)}
.sr-pos{font-size:11px;color:var(--slate);margin-top:2px}
.btn-refresh{
  font-family:var(--f);
  display:flex;align-items:center;gap:7px;
  padding:8px 18px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.9);
  border-radius:var(--r-full);
  cursor:pointer;font-size:12px;font-weight:700;
  transition:all .2s var(--ease);letter-spacing:.4px;
  white-space:nowrap;
}
.btn-refresh:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35)}
.btn-refresh.loading{opacity:.5;pointer-events:none}
.spin-icon{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .7s linear infinite}
.status-dot{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--slate);flex-shrink:0}
.dot.ok{background:var(--emerald);box-shadow:0 0 8px var(--emerald);animation:dotpulse 2s ease-in-out infinite}
.dot.err{background:var(--rose)}
@keyframes dotpulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─────────────────────────────────────────
   STATS BAND
───────────────────────────────────────── */
.stats-band{
  display:flex;background:var(--card);
  border-bottom:1px solid var(--border);
  box-shadow:var(--sh-sm);
}
.stat{
  flex:1;display:flex;align-items:center;gap:14px;
  padding:18px 32px;position:relative;
  transition:background .2s;cursor:default;
}
.stat+.stat::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:1px;background:var(--border)}
.stat:hover{background:var(--sky-xl)}
.stat-ico{
  width:46px;height:46px;border-radius:var(--r);
  display:grid;place-items:center;font-size:22px;flex-shrink:0;
}
.stat-ico.s1{background:linear-gradient(135deg,#DBEAFE,#BFDBFE);box-shadow:0 2px 8px rgba(59,130,246,.15)}
.stat-ico.s2{background:linear-gradient(135deg,#D1FAE5,#A7F3D0);box-shadow:0 2px 8px rgba(16,185,129,.15)}
.stat-ico.s3{background:linear-gradient(135deg,#FEF3C7,#FDE68A);box-shadow:0 2px 8px rgba(245,158,11,.15)}
.stat-ico.s4{background:linear-gradient(135deg,#EDE9FE,#DDD6FE);box-shadow:0 2px 8px rgba(139,92,246,.15)}
.stat-txt{}
.stat-n{font-size:26px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1px}
.stat-l{font-size:11px;color:var(--slate);margin-top:4px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}

/* ─────────────────────────────────────────
   MAIN LAYOUT
───────────────────────────────────────── */
#app{padding:32px 28px 80px;max-width:1700px;margin:0 auto}

/* CEO strip */
.ceo-strip{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:36px;
}
.ceo-card{
  background:linear-gradient(135deg,var(--ink) 0%,var(--ink-2) 100%);
  color:#fff;border-radius:var(--r-xl);
  padding:24px 56px;text-align:center;
  box-shadow:var(--sh-xl);
  position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,.07);
  min-width:320px;
}
.ceo-card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--amber),var(--amber),transparent);
  opacity:.8;
}
.ceo-card::after{
  content:'';position:absolute;
  inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(14,165,233,.12),transparent);
}
.ceo-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);
  color:var(--amber);font-size:10px;font-weight:700;letter-spacing:.8px;
  padding:3px 12px;border-radius:var(--r-full);margin-bottom:12px;
  text-transform:uppercase;
}
.ceo-pos{font-size:19px;font-weight:800;color:#fff;margin-bottom:6px;position:relative;z-index:1}
.ceo-name{font-size:14px;color:rgba(255,255,255,.65);font-weight:400;position:relative;z-index:1}
.conn-v{
  width:2px;height:40px;
  background:linear-gradient(to bottom,var(--ink-3),var(--border-d));
  margin:0 auto;border-radius:1px;
}
.asst-card{
  background:var(--card);
  border:1.5px solid var(--border-d);
  border-radius:var(--r-lg);
  padding:14px 36px;text-align:center;
  box-shadow:var(--sh-md);min-width:260px;
}
.asst-pos{font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:4px}
.asst-name{font-size:12px;color:var(--slate)}

/* ─────────────────────────────────────────
   DEPARTMENTS GRID
───────────────────────────────────────── */
.dept-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}
.dept-card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r-xl);
  overflow:hidden;
  box-shadow:var(--sh-sm);
  transition:box-shadow .25s var(--ease),border-color .25s var(--ease),transform .25s var(--ease);
}
.dept-card:not(.open):hover{
  box-shadow:var(--sh-lg);
  border-color:var(--sky-l);
  transform:translateY(-3px);
}
.dept-card.open{
  border-color:var(--sky);
  box-shadow:var(--sh-lg);
  grid-column:1/-1;
}

/* Dept header */
.dh{
  display:flex;align-items:center;gap:0;
  cursor:pointer;user-select:none;
  transition:background .18s;
  position:relative;
}
.dh:hover{background:#F8FAFC}
.dept-card.open .dh{background:var(--sky-xl);border-bottom:1.5px solid var(--sky-l)}

.dh-color{
  width:6px;align-self:stretch;flex-shrink:0;
  border-radius:0 0 0 0;
}
.dh-body{
  display:flex;align-items:center;gap:14px;
  padding:18px 20px;flex:1;min-width:0;
}
.dh-icon{
  width:50px;height:50px;border-radius:var(--r);
  display:grid;place-items:center;
  font-size:24px;flex-shrink:0;
  box-shadow:var(--sh-sm);
}
.dh-info{flex:1;min-width:0}
.dh-name{
  font-size:15px;font-weight:800;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.dh-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{
  font-size:10px;font-weight:700;padding:2px 9px;
  border-radius:var(--r-full);letter-spacing:.3px;
}
.chip-mgr{background:rgba(11,30,51,.08);color:var(--ink-2)}
.chip-sup{background:var(--amber-l);color:#92400E}
.chip-emp{background:var(--em-l);color:#065F46}
.dh-right{
  display:flex;flex-direction:column;align-items:center;
  padding:18px 20px 18px 12px;gap:5px;flex-shrink:0;
}
.dh-count{font-size:22px;font-weight:800;color:var(--ink);line-height:1}
.dh-label{font-size:9px;color:var(--slate);letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.dh-arrow{font-size:11px;color:var(--slate-l);transition:transform .25s var(--ease);margin-top:2px}
.dept-card.open .dh-arrow{transform:rotate(180deg);color:var(--sky-d)}

/* Dept body */
.db{
  overflow:hidden;
  transition:max-height .55s var(--ease);
  background:#FAFCFF;
}

/* ─────────────────────────────────────────
   TREE INSIDE DEPT
───────────────────────────────────────── */
.tree-wrap{
  padding:32px 24px 28px;
  overflow-x:auto;overflow-y:hidden;
  text-align:center;min-height:40px;
}
.tree-wrap::-webkit-scrollbar{height:5px}
.tree-wrap::-webkit-scrollbar-thumb{background:var(--border-d);border-radius:3px}

.t-node{display:inline-flex;flex-direction:column;align-items:center;vertical-align:top}

/* NODE CARD */
.t-card{
  min-width:196px;max-width:196px;
  padding:16px 14px 22px;
  border-radius:var(--r-lg);
  text-align:center;cursor:pointer;
  transition:transform .2s var(--ease),box-shadow .2s var(--ease);
  position:relative;user-select:none;white-space:normal;
}
.t-card:hover{transform:translateY(-3px)}

/* Level colours */
.c-top{
  background:linear-gradient(145deg,var(--ink),var(--ink-2));
  color:#fff;box-shadow:0 8px 24px rgba(11,30,51,.3);
  border:1px solid rgba(255,255,255,.06);
}
.c-top:hover{box-shadow:0 12px 32px rgba(11,30,51,.4),0 0 0 2px var(--sky)}
.c-mgr{
  background:linear-gradient(145deg,var(--sky-d),var(--sky));
  color:#fff;box-shadow:0 6px 20px rgba(2,132,199,.3);
  border:1px solid rgba(255,255,255,.15);
}
.c-mgr:hover{box-shadow:0 10px 28px rgba(2,132,199,.45)}
.c-sup{
  background:linear-gradient(145deg,var(--teal),#14B8A6);
  color:#fff;box-shadow:0 5px 18px rgba(13,148,136,.28);
  border:1px solid rgba(255,255,255,.15);
}
.c-sup:hover{box-shadow:0 8px 24px rgba(13,148,136,.4)}
.c-emp{
  background:linear-gradient(145deg,var(--emerald),#10B981);
  color:#fff;box-shadow:0 4px 14px rgba(5,150,105,.25);
  border:1px solid rgba(255,255,255,.15);
}
.c-emp:hover{box-shadow:0 7px 20px rgba(5,150,105,.38)}

/* Card content */
.t-card .cp{font-size:13px;font-weight:800;line-height:1.4;color:#fff}
.t-card.c-top .cp{font-size:14px;color:var(--sky-l)}
.t-card .cn{font-size:12px;opacity:.82;margin-top:5px;line-height:1.5;font-weight:500}
.t-card .cb{
  font-size:10px;margin-top:9px;
  background:rgba(255,255,255,.18);
  padding:3px 10px;border-radius:var(--r-full);
  display:inline-block;font-weight:600;color:rgba(255,255,255,.9);
}

/* Badge */
.t-card .badge{
  position:absolute;top:-9px;left:-9px;
  background:var(--rose);color:#fff;
  min-width:26px;height:26px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;padding:0 6px;
  box-shadow:0 3px 8px rgba(225,29,72,.4);
  border:2px solid #fff;
}
/* Expand btn */
.t-card .tbtn{
  position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  width:30px;height:30px;
  background:var(--card);border:2px solid var(--border-d);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:800;color:var(--slate);
  z-index:5;transition:all .18s var(--ease);
  box-shadow:var(--sh-sm);line-height:1;
}
.t-card:hover .tbtn{border-color:var(--sky-d);color:var(--sky-d)}

/* Connectors */
.t-vline{
  width:2px;height:32px;flex-shrink:0;
  background:linear-gradient(to bottom,var(--border-d),var(--border));
  margin:0 auto;border-radius:1px;
}
.t-children{
  display:inline-flex;justify-content:center;align-items:flex-start;
  gap:18px;position:relative;padding-top:32px;
  flex-wrap:nowrap;min-width:max-content;
}
.t-children::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:2px;background:var(--border-d);border-radius:1px;
}
.t-children.single::before{display:none}
.t-child{
  display:inline-flex;flex-direction:column;align-items:center;
  position:relative;vertical-align:top;flex:0 0 auto;
}
.t-child::before{
  content:'';position:absolute;top:-32px;left:50%;transform:translateX(-50%);
  width:2px;height:32px;background:var(--border-d);border-radius:1px;
}

/* ─────────────────────────────────────────
   EMPLOYEE LIST PANEL
───────────────────────────────────────── */
.emp-list-wrap{display:flex;flex-direction:column;align-items:center;width:100%;padding-top:20px}
.emp-list{
  width:min(100%,1080px);
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:18px 20px;
  box-shadow:var(--sh-sm);
}
.emp-list-hd{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:700;color:var(--slate);
  letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.emp-list-hd span{
  background:var(--sky-xl);color:var(--sky-d);
  font-size:10px;padding:2px 8px;border-radius:var(--r-full);font-weight:800;
}
.emp-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:8px;
}
.emp-card{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 12px;
  transition:all .18s var(--ease);
}
.emp-card:hover{background:var(--sky-xl);border-color:var(--sky-l);transform:translateY(-1px)}
.e-av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;
  font-size:13px;font-weight:800;color:#fff;
}
.e-info{flex:1;min-width:0}
.e-name{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-pos{font-size:11px;color:var(--slate);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-branch{
  font-size:10px;background:var(--sky-xl);
  color:var(--sky-d);border:1px solid var(--sky-l);
  padding:2px 8px;border-radius:var(--r-full);
  white-space:nowrap;flex-shrink:0;font-weight:700;
}

/* ─────────────────────────────────────────
   DEPT ICON COLOUR PAIRS  (bg / accent)
───────────────────────────────────────── */
.di1{background:linear-gradient(135deg,#1E40AF,#3B82F6)}
.di2{background:linear-gradient(135deg,#065F46,#10B981)}
.di3{background:linear-gradient(135deg,#7F1D1D,#EF4444)}
.di4{background:linear-gradient(135deg,#78350F,#F59E0B)}
.di5{background:linear-gradient(135deg,#4C1D95,#8B5CF6)}
.di6{background:linear-gradient(135deg,#134E4A,#14B8A6)}
.di7{background:linear-gradient(135deg,#1C1917,#78716C)}
.di8{background:linear-gradient(135deg,#1E3A8A,#60A5FA)}
.di9{background:linear-gradient(135deg,#831843,#EC4899)}
.di10{background:linear-gradient(135deg,#064E3B,#34D399)}
.di11{background:linear-gradient(135deg,#7C2D12,#FB923C)}
.di12{background:linear-gradient(135deg,#1E1B4B,#6366F1)}
.di13{background:linear-gradient(135deg,#164E63,#22D3EE)}
.di14{background:linear-gradient(135deg,#3B0764,#A855F7)}
.di15{background:linear-gradient(135deg,#0F172A,#475569)}
/* Matching left border accents */
.bc1{background:#3B82F6}.bc2{background:#10B981}.bc3{background:#EF4444}
.bc4{background:#F59E0B}.bc5{background:#8B5CF6}.bc6{background:#14B8A6}
.bc7{background:#78716C}.bc8{background:#60A5FA}.bc9{background:#EC4899}
.bc10{background:#34D399}.bc11{background:#FB923C}.bc12{background:#6366F1}
.bc13{background:#22D3EE}.bc14{background:#A855F7}.bc15{background:#475569}

/* ─────────────────────────────────────────
   LOADING / ERROR
───────────────────────────────────────── */
.loading-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;gap:20px;
}
.ld-ring{
  width:60px;height:60px;border-radius:50%;
  border:3px solid var(--border);
  border-top-color:var(--sky-d);
  border-right-color:var(--sky);
  animation:spin .85s linear infinite;
}
.ld-text{font-size:14px;color:var(--slate);font-weight:500}
.err-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;gap:14px;text-align:center;
}
.err-ico{font-size:52px}
.err-title{font-size:22px;font-weight:800;color:var(--rose)}
.err-msg{font-size:13px;color:var(--slate);max-width:480px;line-height:1.8}

/* ─────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────── */
@media(max-width:900px){
  .hd-inner{padding:0 18px;height:60px}
  .hd-search{display:none}
  .hd-search-wrap{display:none}
  .hd-sub{display:none}
  .stat{padding:14px 18px}
  .stat-ico{width:38px;height:38px;font-size:18px}
  .stat-n{font-size:22px}
  #app{padding:20px 14px 60px}
  .dept-grid{grid-template-columns:1fr}
  .dept-card.open{grid-column:1}
  .t-card{min-width:168px;max-width:168px;padding:13px 11px 20px}
  .t-card .cp{font-size:12px}
  .t-card .cn{font-size:11px}
  .t-children{gap:12px}
  .ceo-card{padding:20px 28px;min-width:unset;width:100%;max-width:380px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hd">
  <div class="hd-inner">
    <div class="hd-brand">
      <div class="hd-logo">🏛️</div>
      <div>
        <div class="hd-title">الهيكل التنظيمي الإداري</div>
        <div class="hd-sub">متصل مباشرة بـ Google Sheet</div>
      </div>
    </div>
    <div class="hd-actions">
      <div class="hd-search-wrap">
        <input class="hd-search" id="si" type="text" placeholder="🔍  ابحث عن موظف أو قسم…" oninput="onSearch(this.value)" autocomplete="off">
        <div class="hd-sr" id="sr"></div>
      </div>
      <div class="status-dot">
        <div class="dot" id="dot"></div>
        <span id="statusText">جاري التحميل…</span>
      </div>
      <button class="btn-refresh" id="refreshBtn" onclick="loadData()">
        <span class="spin-icon" id="refreshIcon">↻</span>
        تحديث
      </button>
    </div>
  </div>
</header>

<!-- STATS -->
<div class="stats-band" id="statsBand" style="display:none">
  <div class="stat">
    <div class="stat-ico s1">👤</div>
    <div class="stat-txt">
      <div class="stat-n" id="sn1">0</div>
      <div class="stat-l">إجمالي الموظفين</div>
    </div>
  </div>
  <div class="stat">
    <div class="stat-ico s2">🏢</div>
    <div class="stat-txt">
      <div class="stat-n" id="sn2">0</div>
      <div class="stat-l">الأقسام</div>
    </div>
  </div>
  <div class="stat">
    <div class="stat-ico s3">👔</div>
    <div class="stat-txt">
      <div class="stat-n" id="sn3">0</div>
      <div class="stat-l">المدراء</div>
    </div>
  </div>
  <div class="stat">
    <div class="stat-ico s4">🎖️</div>
    <div class="stat-txt">
      <div class="stat-n" id="sn4">0</div>
      <div class="stat-l">المشرفون</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="loading-wrap">
    <div class="ld-ring"></div>
    <div class="ld-text">جاري تحميل البيانات من Google Sheet…</div>
  </div>
</div>

<script>
// ─────────────── CONFIG ───────────────
const SHEET_ID = '1GjFYMDHBmf_ugxci0mecqvq9GBzFmAMI5ENSrmItl3E';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

// ─────────────── STATE ───────────────
let DATA=[], nm={}, cm={};
let exp=new Set(), oD=new Set();

// ─────────────── KEY REGISTRY (safe onclick) ───────────────
let _k=[];
const regKey=v=>{const i=_k.length;_k.push(v);return i};
const getKey=i=>_k[i];
const resetKeys=()=>{_k=[]};
window.getKey=getKey;

// ─────────────── DEPT ICONS ───────────────
const DI={
  'الادارة':'🏢','التسويق':'📣','التصميم الداخلي':'🎨','الحسابات':'💰',
  'القانونية':'⚖️','المبيعات الحكومية':'🏛️','المبيعات المباشرة':'🤝',
  'المخازن':'📦','المشتريات':'🛒','المشروع':'📋','الموارد البشرية':'👥',
  'إدارة الجودة':'✅','تكنلوجيا المعلومات':'💻','خدمات ما بعد البيع':'🔧',
  'مبيعات الشركات':'🏪','الادارة العامة':'👔'
};

// Avatar colours
const AVC=['#1E40AF','#065F46','#7F1D1D','#78350F','#4C1D95',
           '#134E4A','#1C1917','#1E3A8A','#831843','#064E3B',
           '#7C2D12','#1E1B4B','#164E63','#3B0764','#0F172A'];
const avCol=n=>AVC[([...n].reduce((a,c)=>a+c.charCodeAt(0),0))%AVC.length];

function esc(s){
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─────────────── CSV PARSER ───────────────
function parseCSV(t){
  const rows=[];let cur='',inQ=false,row=[];
  t=t.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<t.length;i++){
    const c=t[i];
    if(inQ){
      if(c==='"'&&t[i+1]==='"'){cur+='"';i++}
      else if(c==='"')inQ=false;
      else cur+=c;
    }else{
      if(c==='"')inQ=true;
      else if(c===','){row.push(cur.trim());cur=''}
      else if(c==='\n'){row.push(cur.trim());rows.push(row);row=[];cur=''}
      else cur+=c;
    }
  }
  if(cur||row.length){row.push(cur.trim());rows.push(row)}
  return rows;
}

// ─────────────── LOAD DATA ───────────────
async function loadData(){
  const btn=document.getElementById('refreshBtn');
  const icon=document.getElementById('refreshIcon');
  const status=document.getElementById('statusText');
  const dot=document.getElementById('dot');
  btn.classList.add('loading');
  icon.classList.add('spinning');
  status.textContent='جاري التحميل…';
  dot.className='dot';
  try{
    const r=await fetch(CSV_URL);
    if(!r.ok)throw new Error('فشل الاتصال');
    const text=await r.text();
    const rows=parseCSV(text);
    if(rows.length<2)throw new Error('الملف فارغ');

    const h=rows[0].map(x=>x.replace(/\ufeff/g,'').trim().toLowerCase());
    const iN=h.findIndex(x=>x.includes('employee')||x.includes('name')||x.includes('اسم'));
    const iB=h.findIndex(x=>x.includes('branch')||x.includes('فرع'));
    const iD=h.findIndex(x=>x.includes('department')||x.includes('dept')||x.includes('قسم'));
    const iP=h.findIndex(x=>x.includes('position')||x.includes('منصب')||x.includes('وظيفة'));
    const iM=h.findIndex(x=>x.includes('manager')||x.includes('مدير'));

    if(iN<0)throw new Error('عمود الاسم غير موجود');
    if(iD<0)throw new Error('عمود القسم غير موجود');

    DATA=[];
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      const name=(row[iN]||'').trim();
      if(!name)continue;
      DATA.push({
        name,
        branch: iB>=0?(row[iB]||'').trim():'',
        dept:   iD>=0?(row[iD]||'').trim():'',
        pos:    iP>=0?(row[iP]||'').trim():'',
        mgr:    iM>=0?(row[iM]||'').trim()||null:null,
      });
    }
    DATA.forEach(e=>{if(e.mgr===e.name)e.mgr=null});
    buildMaps();

    // Update stats
    const deptSet=new Set(DATA.filter(e=>e.dept&&e.dept!=='الادارة العامة').map(e=>e.dept));
    document.getElementById('sn1').textContent=DATA.length;
    document.getElementById('sn2').textContent=deptSet.size;
    document.getElementById('sn3').textContent=DATA.filter(e=>lv(e)==='mgr'||lv(e)==='top').length;
    document.getElementById('sn4').textContent=DATA.filter(e=>lv(e)==='sup').length;
    document.getElementById('statsBand').style.display='flex';

    renderAll();
    icon.classList.remove('spinning');
    status.textContent='متصل — '+DATA.length+' موظف';
    dot.className='dot ok';
    document.getElementById('statusText').textContent=
      'متصل · آخر تحديث '+new Date().toLocaleTimeString('ar-IQ');
  }catch(err){
    console.error(err);
    icon.classList.remove('spinning');
    status.textContent='خطأ: '+err.message;
    dot.className='dot err';
    if(!DATA.length){
      document.getElementById('app').innerHTML=`
        <div class="err-wrap">
          <div class="err-ico">⚠️</div>
          <div class="err-title">تعذّر تحميل البيانات</div>
          <div class="err-msg">تأكد من أن Google Sheet مشارك كـ "أي شخص لديه الرابط — مشاهد"
          ثم اضغط زر التحديث.</div>
        </div>`;
    }
  }
  btn.classList.remove('loading');
}

// ─────────────── BUILD MAPS (dept-scoped) ───────────────
function buildMaps(){
  nm={};cm={};
  DATA.forEach(e=>{nm[e.name]=e});
  DATA.forEach(e=>{
    if(!e.mgr||e.mgr===e.name)return;
    const m=nm[e.mgr];if(!m)return;
    if(m.dept!==e.dept)return; // DEPT SCOPED
    if(!cm[e.mgr])cm[e.mgr]=[];
    cm[e.mgr].push(e.name);
  });
}

// ─────────────── HELPERS ───────────────
function lv(e){
  if(!e)return'emp';
  const p=e.pos||'';
  if(p.includes('المدير المفوض')||p.includes('مساعد المدير'))return'top';
  if(p.includes('مدير'))return'mgr';
  if(p.includes('مشرف')||p.includes('رئيس')||p.includes('مسؤول الصندوق'))return'sup';
  return'emp';
}
function cls(e){const l=lv(e);return l==='top'?'c-top':l==='mgr'?'c-mgr':l==='sup'?'c-sup':'c-emp'}

function heads(dept){
  const ms=DATA.filter(e=>e.dept===dept);
  const set=new Set(ms.map(m=>m.name));
  return ms.filter(m=>!m.mgr||m.mgr===m.name||!set.has(m.mgr));
}

// ─────────────── RENDER NODE ───────────────
function rNode(name){
  const e=nm[name];if(!e)return'';
  const kids=cm[name]||[];
  const hk=kids.length>0;
  const ie=exp.has(name);
  const nid=regKey(name);

  let h=`<div class="t-node">
  <div class="t-card ${cls(e)}" onclick="toggleNode(getKey(${nid}))">
    <div class="cp">${esc(e.pos||'—')}</div>
    <div class="cn">${esc(e.name)}</div>
    ${e.branch?`<div class="cb">${esc(e.branch)}</div>`:''}
    ${hk?`<span class="badge">${kids.length}</span><div class="tbtn">${ie?'−':'+'}</div>`:''}
  </div>`;

  if(hk&&ie){
    const ek=kids.filter(k=>lv(nm[k])==='emp');
    const nk=kids.filter(k=>lv(nm[k])!=='emp');
    h+=`<div class="t-vline"></div>`;
    if(nk.length){
      h+=`<div class="t-children${nk.length===1?' single':''}">`;
      nk.forEach(k=>{h+=`<div class="t-child">${rNode(k)}</div>`});
      h+='</div>';
    }
    if(ek.length){
      h+=`<div class="emp-list-wrap">`;
      if(!nk.length)h+=`<div class="t-vline"></div>`;
      h+=`<div class="emp-list">
        <div class="emp-list-hd">الموظفون المرتبطون مباشرة <span>${ek.length}</span></div>
        <div class="emp-grid">`;
      ek.forEach(k=>{
        const x=nm[k];
        const col=avCol(x.name);
        h+=`<div class="emp-card">
          <div class="e-av" style="background:${col}">${esc((x.name||'?')[0])}</div>
          <div class="e-info">
            <div class="e-name">${esc(x.name)}</div>
            <div class="e-pos">${esc(x.pos||'موظف')}</div>
          </div>
          ${x.branch?`<div class="e-branch">${esc(x.branch)}</div>`:''}
        </div>`;
      });
      h+=`</div></div></div>`;
    }
  }
  h+='</div>';
  return h;
}

// ─────────────── RENDER ALL ───────────────
function renderAll(){
  resetKeys();
  const ceo=DATA.find(e=>!e.mgr&&e.pos&&e.pos.includes('المدير المفوض'));
  const asst=DATA.find(e=>e.pos&&(e.pos.includes('مساعد المدير')||e.pos.includes('مساعد شخصي')));

  const deptSet=new Set();
  DATA.forEach(e=>{if(e.dept&&e.dept!=='الادارة العامة')deptSet.add(e.dept)});
  const depts=[...deptSet].sort();

  const dm={};
  DATA.forEach(e=>{if(!dm[e.dept])dm[e.dept]=[];dm[e.dept].push(e)});

  let html='';

  // CEO
  if(ceo||asst){
    html+=`<div class="ceo-strip">`;
    if(ceo){
      html+=`<div class="ceo-card">
        <div class="ceo-badge">⭐ الإدارة العليا</div>
        <div class="ceo-pos">${esc(ceo.pos)}</div>
        <div class="ceo-name">${esc(ceo.name)}</div>
      </div>`;
    }
    if(ceo&&asst)html+=`<div class="conn-v"></div>`;
    if(asst){
      html+=`<div class="asst-card">
        <div class="asst-pos">${esc(asst.pos)}</div>
        <div class="asst-name">${esc(asst.name)}</div>
      </div>`;
    }
    html+=`</div>`;
  }

  // Dept grid
  html+=`<div class="dept-grid">`;
  depts.forEach((dept,i)=>{
    const ms=dm[dept]||[];if(!ms.length)return;
    const isOpen=oD.has(dept);
    const icon=DI[dept]||'📁';
    const ci=(i%15)+1;
    const did=regKey(dept);
    const mgrs=ms.filter(m=>lv(m)==='mgr'||lv(m)==='top').length;
    const sups=ms.filter(m=>lv(m)==='sup').length;
    const emps=ms.filter(m=>lv(m)==='emp').length;

    html+=`<div class="dept-card${isOpen?' open':''}" id="dp-${i}">
      <div class="dh" onclick="toggleDept(getKey(${did}))">
        <div class="dh-color bc${ci}"></div>
        <div class="dh-body">
          <div class="dh-icon di${ci}">${icon}</div>
          <div class="dh-info">
            <div class="dh-name">${esc(dept)}</div>
            <div class="dh-chips">
              ${mgrs?`<span class="chip chip-mgr">${mgrs} مدير</span>`:''}
              ${sups?`<span class="chip chip-sup">${sups} مشرف</span>`:''}
              ${emps?`<span class="chip chip-emp">${emps} موظف</span>`:''}
            </div>
          </div>
        </div>
        <div class="dh-right">
          <div class="dh-count">${ms.length}</div>
          <div class="dh-label">موظف</div>
          <div class="dh-arrow">▼</div>
        </div>
      </div>
      <div class="db" style="max-height:${isOpen?'30000px':'0'}">`;

    if(isOpen){
      html+=`<div class="tree-wrap">`;
      const hs=heads(dept);
      if(!hs.length){
        html+=`<div class="t-children">`;
        ms.forEach(m=>{html+=`<div class="t-child">${rNode(m.name)}</div>`});
        html+=`</div>`;
      }else if(hs.length===1){
        html+=rNode(hs[0].name);
      }else{
        html+=`<div class="t-children">`;
        hs.forEach(m=>{html+=`<div class="t-child">${rNode(m.name)}</div>`});
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div></div>`;
  });
  html+=`</div>`;

  document.getElementById('app').innerHTML=html;
  window._depts=depts;
}

// ─────────────── INTERACTIONS ───────────────
function toggleDept(dept){oD.has(dept)?oD.delete(dept):oD.add(dept);renderAll()}
function toggleNode(name){exp.has(name)?exp.delete(name):exp.add(name);renderAll()}
window.toggleDept=toggleDept;
window.toggleNode=toggleNode;

// ─────────────── SEARCH ───────────────
function onSearch(v){
  const sr=document.getElementById('sr');
  if(!sr||!v||v.length<2){if(sr)sr.classList.remove('vis');return}
  const res=DATA.filter(e=>
    e.name.includes(v)||(e.pos&&e.pos.includes(v))||e.dept.includes(v)
  ).slice(0,10);
  if(!res.length){sr.classList.remove('vis');return}
  sr.classList.add('vis');
  sr.innerHTML=res.map(x=>{
    const sid=regKey(x.name);
    const col=avCol(x.name);
    return`<div class="sr-item" onclick="openEmp(getKey(${sid}))">
      <div class="sr-av" style="background:${col}">${esc((x.name||'?')[0])}</div>
      <div>
        <div class="sr-name">${esc(x.name)}</div>
        <div class="sr-pos">${esc(x.pos||'')}${x.dept?' — '+esc(x.dept):''}</div>
      </div>
    </div>`;
  }).join('');
}
function openEmp(name){
  const e=nm[name];if(!e)return;
  document.getElementById('si').value='';
  document.getElementById('sr').classList.remove('vis');
  oD.add(e.dept);
  let cur=e.mgr;const vis=new Set();
  while(cur&&cur!==name&&nm[cur]&&!vis.has(cur)){
    vis.add(cur);exp.add(cur);
    const p=nm[cur];cur=(p.mgr&&p.mgr!==p.name)?p.mgr:null;
  }
  renderAll();
  setTimeout(()=>{
    const idx=(window._depts||[]).indexOf(e.dept);
    const el=document.getElementById('dp-'+idx);
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}
window.onSearch=onSearch;
window.openEmp=openEmp;

// ─────────────── INIT ───────────────
loadData();
setInterval(loadData,120000);
</script>
</body>
</html>
