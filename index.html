<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الهيكل التنظيمي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">🏢</div>
      <div class="header-text">
        <h1>الهيكل التنظيمي الإداري</h1>
        <p class="header-sub">المخطط الهيكلي التنظيمي للشركة — متصل بـ Google Sheet</p>
      </div>
    </div>
  </header>

  <!-- ══ TOOLBAR ══ -->
  <div class="toolbar">
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span id="refreshIcon">🔄</span>
      <span>تحديث البيانات</span>
    </button>
    <div class="toolbar-status">
      <span class="status-badge" id="statusText">جاري التحميل...</span>
      <span class="last-update" id="lastUpdate"></span>
    </div>
  </div>

  <!-- ══ MAIN CONTENT ══ -->
  <main id="mainContent">
    <div class="loading-screen" id="loadingScreen">
      <div class="loader-ring"></div>
      <p>جاري تحميل البيانات من Google Sheet...</p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
